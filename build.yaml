name: Eyelash Sofle (self-contained, Option B)

# The Actions workflow reads this file; no need to touch .github/workflows/build.yml
zmk_config: config

# No extra_modules: we vendored the board locally.
# extra_modules: []

include:
  # LEFT (primary) firmware
  - board: eyelash_sofle_left
    shield: nice_view_adapter nice_view
    artifact-name: eyelash_sofle_left

  # RIGHT (peripheral) firmware
  - board: eyelash_sofle_right
    shield: nice_view_adapter nice_view
    artifact-name: eyelelash_sofle_right

  # Optional settings reset images (one per side)
  - board: eyelash_sofle_left
    shield: settings_reset
    artifact-name: settings_reset_left

  - board: eyelash_sofle_right
    shield: settings_reset
    artifact-name: settings_reset_right
